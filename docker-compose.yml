services:
  postgres:
    image: postgres:16
    container_name: habittracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: habittracker
      POSTGRES_USER: habittracker
      POSTGRES_PASSWORD: habittracker
    ports:
      - "5432:5432"
    volumes:
      - habittracker-postgres-data:/var/lib/postgresql/data

volumes:
  habittracker-postgres-data:
